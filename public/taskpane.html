<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>AI PPT 助手</title>

  <!-- Office.js — 条件加载 -->
  <script>
    (function () {
      try {
        if (window.location.search.includes('_host_Info') ||
            window.external && window.external.GetContext ||
            window.OSF) {
          var s = document.createElement('script');
          s.src = 'https://appsforoffice.microsoft.com/lib/1/hosted/office.js';
          s.async = false;
          document.head.appendChild(s);
        }
      } catch (e) {}
    })();
  </script>

  <style>
    /* 首屏加载骨架 */
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #root { height: 100vh; }
    .loading-skeleton {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; color: #999; gap: 12px;
    }
    .loading-skeleton .spinner {
      width: 24px; height: 24px; border: 2px solid #e5e5ea;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-skeleton">
      <div class="spinner"></div>
      <span>AI PPT 助手加载中...</span>
    </div>
  </div>
</body>
</html>
